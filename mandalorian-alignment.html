<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandalorian Executive Alignment Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --beskar: #8C9A8E;
    --beskar-light: #B8C8BA;
    --beskar-dark: #4A5A4C;
    --mandalore-red: #8B1A1A;
    --mandalore-gold: #C8941A;
    --mandalore-gold-light: #E8B840;
    --ember: #D4521A;
    --void: #080A09;
    --deep: #0E1210;
    --panel: #131815;
    --panel-light: #1A211C;
    --scan-line: rgba(140,200,140,0.03);
    --text-primary: #C8D4C0;
    --text-dim: #6A7A6C;
    --border: #2A3A2C;
    --font-display: 'Orbitron', monospace;
    --font-mono: 'Share Tech Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--void);
    font-family: var(--font-mono);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, var(--scan-line) 0px, var(--scan-line) 1px, transparent 1px, transparent 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── HEADER ── */
  .mando-header {
    background: linear-gradient(180deg, #0A0F0B 0%, var(--deep) 100%);
    border-bottom: 1px solid var(--mandalore-gold);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .mando-header::after {
    content: '';
    position: absolute;
    bottom: -3px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--mandalore-gold), transparent);
    opacity: 0.4;
  }

  .helmet-icon { width: 40px; height: 40px; flex-shrink: 0; }

  .header-title { flex: 1; padding: 0 16px; }
  .header-title .callsign {
    font-family: var(--font-display);
    font-size: 9px;
    letter-spacing: 0.4em;
    color: var(--mandalore-gold);
    text-transform: uppercase;
  }
  .header-title .mission {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    color: var(--beskar-light);
    letter-spacing: 0.08em;
    margin-top: 1px;
  }

  .timer-panel { text-align: right; }
  .timer-display {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #9BC99B;
    transition: color 0.5s;
  }
  .timer-label { font-size: 9px; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase; }
  .timer-controls { display: flex; gap: 6px; margin-top: 4px; justify-content: flex-end; }

  .btn-small {
    background: var(--panel-light);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    font-family: var(--font-display);
    font-size: 8px;
    letter-spacing: 0.2em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-small:hover { border-color: var(--beskar); color: var(--beskar-light); }
  .btn-small.active { border-color: var(--mandalore-gold); color: var(--mandalore-gold); }

  .export-btn {
    background: var(--panel);
    border: 1px solid var(--mandalore-gold);
    color: var(--mandalore-gold);
    padding: 7px 14px;
    font-family: var(--font-display);
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: 12px;
  }
  .export-btn:hover { background: rgba(200,148,26,0.1); }

  /* ── NAV ── */
  .phase-nav {
    display: flex;
    background: var(--deep);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 70px;
    z-index: 99;
  }

  .phase-btn {
    flex: 1;
    padding: 10px 8px 8px;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.2s;
    text-align: center;
  }
  .phase-btn .glyph { display: block; font-size: 16px; margin-bottom: 3px; font-family: var(--font-mono); }
  .phase-btn:hover { color: var(--beskar-light); background: rgba(140,154,142,0.05); }
  .phase-btn.active { color: var(--mandalore-gold); border-bottom-color: var(--mandalore-gold); background: rgba(200,148,26,0.05); }

  /* ── CONTENT ── */
  .phase-content { padding: 20px; max-width: 820px; margin: 0 auto; }

  .phase-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .phase-icon-large {
    width: 44px; height: 44px;
    border: 1px solid var(--mandalore-gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    background: rgba(200,148,26,0.05);
    font-family: var(--font-mono);
  }
  .phase-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--beskar-light); letter-spacing: 0.06em; }
  .phase-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-style: italic; letter-spacing: 0.05em; }

  /* ── FIELDS ── */
  .field-label {
    font-family: var(--font-display);
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--beskar-dark);
    text-transform: uppercase;
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .field-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  textarea, input[type="text"] {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--beskar-dark);
    color: var(--text-primary);
    padding: 10px 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus, input[type="text"]:focus {
    border-color: var(--beskar);
    border-left-color: var(--mandalore-gold);
    background: var(--panel-light);
  }

  /* ── BUTTONS ── */
  .ai-btn {
    background: var(--panel);
    border: 1px solid var(--beskar-dark);
    color: var(--beskar-light);
    padding: 9px 18px;
    font-family: var(--font-display);
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ai-btn::before { content: '◈ '; color: var(--mandalore-gold); }
  .ai-btn:hover { border-color: var(--mandalore-gold); color: var(--mandalore-gold-light); background: rgba(200,148,26,0.06); }
  .ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── INTEL PANELS ── */
  .intel-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--mandalore-gold);
    margin-top: 14px;
  }
  .intel-header {
    background: rgba(200,148,26,0.06);
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-display);
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--mandalore-gold);
    text-transform: uppercase;
  }
  .intel-header::before { content: '▶ '; font-size: 6px; }
  .intel-body { padding: 12px 14px; font-size: 12px; line-height: 1.65; }
  .intel-row { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .intel-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .intel-row-label { font-family: var(--font-display); font-size: 7px; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
  .question-highlight {
    font-size: 13px; color: var(--beskar-light); font-style: italic;
    padding: 8px 12px; background: rgba(140,154,142,0.05); border-left: 2px solid var(--beskar);
  }

  /* ── CUES ── */
  .cue-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .cue-chip {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text-dim); padding: 5px 10px;
    font-size: 11px; font-style: italic; font-family: var(--font-mono);
  }

  /* ── SESSION FLOW ── */
  .session-flow { background: var(--panel); border: 1px solid var(--border); margin-top: 20px; }
  .session-flow-header {
    background: rgba(140,154,142,0.05); padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-display); font-size: 7px;
    letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase;
  }
  .flow-row { display: flex; gap: 14px; padding: 9px 14px; border-bottom: 1px solid var(--border); }
  .flow-row:last-child { border-bottom: none; }
  .flow-phase { font-family: var(--font-display); font-size: 8px; letter-spacing: 0.2em; color: var(--mandalore-gold); width: 70px; padding-top: 1px; flex-shrink: 0; }
  .flow-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

  /* ── ACTIONS ── */
  .action-row { display: grid; grid-template-columns: 1fr 140px 130px 32px; gap: 6px; margin-bottom: 6px; }
  .add-action-btn {
    background: transparent; border: 1px dashed var(--border); color: var(--text-dim);
    padding: 7px 14px; font-family: var(--font-display); font-size: 8px;
    letter-spacing: 0.15em; cursor: pointer; text-transform: uppercase;
    transition: all 0.2s; margin-top: 6px;
  }
  .add-action-btn:hover { border-color: var(--beskar-dark); color: var(--beskar); }
  .del-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    cursor: pointer; font-size: 14px; transition: all 0.2s;
  }
  .del-btn:hover { border-color: var(--mandalore-red); color: var(--mandalore-red); }

  /* ── COMMIT ── */
  .commit-box {
    background: rgba(200,148,26,0.04); border: 1px solid var(--mandalore-gold);
    padding: 14px 16px; margin-top: 14px;
    font-size: 13px; line-height: 1.65; font-style: italic; color: var(--beskar-light);
  }

  .flex-gap { display: flex; gap: 10px; flex-wrap: wrap; }
  .mb-14 { margin-bottom: 14px; }
  .mb-20 { margin-bottom: 20px; }
  .mt-16 { margin-top: 16px; }

  .loading-pulse { animation: pulse 1.2s ease-in-out infinite; display: inline-block; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--void); }
  ::-webkit-scrollbar-thumb { background: var(--beskar-dark); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="mando-header">
  <svg class="helmet-icon" viewBox="0 0 40 46" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 2C11 2 4 10 4 20V30L8 38H12L14 42H26L28 38H32L36 30V20C36 10 29 2 20 2Z" fill="#4A5A4C" stroke="#8C9A8E" stroke-width="1"/>
    <path d="M8 22L12 18H28L32 22V28L28 32H12L8 28V22Z" fill="#2A3A2C" stroke="#6A7A6C" stroke-width="0.5"/>
    <path d="M12 20H28V22H12V20Z" fill="#C8941A" opacity="0.8"/>
    <path d="M14 22H26V26H14V22Z" fill="#1A211C"/>
    <path d="M14 22H20V26H14V22Z" fill="#0A140C"/>
    <path d="M8 28L12 32V38H8L6 32L8 28Z" fill="#3A4A3C" stroke="#5A6A5C" stroke-width="0.5"/>
    <path d="M32 28L28 32V38H32L34 32L32 28Z" fill="#3A4A3C" stroke="#5A6A5C" stroke-width="0.5"/>
  </svg>
  <div class="header-title">
    <div class="callsign">MANDALORIAN TACTICAL FRAMEWORK</div>
    <div class="mission">EXECUTIVE ALIGNMENT PROTOCOL</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="timer-panel">
      <div class="timer-display" id="timer-display">00:00</div>
      <div class="timer-label">30:00 MISSION WINDOW</div>
      <div class="timer-controls">
        <button class="btn-small" id="timer-start-btn" onclick="toggleTimer()">▶ START</button>
        <button class="btn-small" onclick="resetTimer()">↺ RESET</button>
      </div>
    </div>
    <button class="export-btn" onclick="exportSession()">↓ DEBRIEF</button>
  </div>
</div>

<!-- PHASE NAV -->
<div class="phase-nav">
  <button class="phase-btn active" data-phase="problem" onclick="setPhase('problem')"><span class="glyph">⬡</span>DEFINE</button>
  <button class="phase-btn" data-phase="align" onclick="setPhase('align')"><span class="glyph">◈</span>ALIGN</button>
  <button class="phase-btn" data-phase="explore" onclick="setPhase('explore')"><span class="glyph">◇</span>EXPLORE</button>
  <button class="phase-btn" data-phase="challenge" onclick="setPhase('challenge')"><span class="glyph">◆</span>CHALLENGE</button>
  <button class="phase-btn" data-phase="commit" onclick="setPhase('commit')"><span class="glyph">●</span>COMMIT</button>
</div>

<!-- CONTENT -->
<div class="phase-content" id="phase-content"></div>

<script>
// ── CONFIG ── Replace with your API key from console.anthropic.com
const API_KEY = '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;

const SYSTEM_PROMPT = `You are an executive facilitation specialist trained in consultative dialogue and the Never Split the Difference framework. Support a 30-minute structured executive conversation through ALIGN → EXPLORE → CHALLENGE → COMMIT phases.

Rules:
- Use open calibrated questions only (How, What, Tell me more)
- Never be prescriptive or directive
- Use tactical empathy — label emotions, mirror language
- Surface unstated assumptions gently
- Keep responses concise and actionable
- Respond ONLY with valid JSON: { "insight": "...", "suggestion": "...", "nextQuestion": "..." }`;

const PHASES = [
  { id: 'problem',   glyph: '⬡', title: 'DEFINE MISSION PARAMETERS',   subtitle: 'Frame the problem before the conversation begins' },
  { id: 'align',     glyph: '◈', title: 'ALIGN',     subtitle: 'Build shared understanding — what do we all agree is true?' },
  { id: 'explore',   glyph: '◇', title: 'EXPLORE',   subtitle: 'Open the space — what have we not yet considered?' },
  { id: 'challenge', glyph: '◆', title: 'CHALLENGE', subtitle: 'Test the thinking — what are we assuming that may not be true?' },
  { id: 'commit',    glyph: '●', title: 'COMMIT',    subtitle: 'Crystallise the decision — what are we agreeing to?' },
];

const CUES = {
  align:     ['"What does this mean to you personally?"', '"What would success look like from your position?"', '"Where do you feel most uncertain?"'],
  explore:   ['"What\'s the best case if we do nothing?"', '"Who else has a stake in this?"', '"What would someone who disagrees say?"'],
  challenge: ['"What would have to be true for this to fail?"', '"What\'s the argument against your own position?"', '"If you\'re wrong, what does that cost?"'],
};

const state = {
  phase: 'problem',
  problemStatement: '',
  openingQuestion: '',
  notes: { align: '', explore: '', challenge: '', commit: '' },
  aiResponses: { align: null, explore: null, challenge: null, commit: null },
  commitmentStatement: '',
  actions: [{ what: '', who: '', by: '' }],
  elapsed: 0,
  timerRunning: false,
  timerInterval: null,
  loading: {},
};

// ── API ──
async function callAI(prompt) {
  if (API_KEY === 'YOUR_API_KEY_HERE') {
    alert('Please set your API key in the HTML file. Open the file in a text editor and replace YOUR_API_KEY_HERE with your key from console.anthropic.com');
    return null;
  }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    alert(`API Error ${res.status}: ${err.error?.message || res.statusText}`);
    return null;
  }
  const data = await res.json();
  const text = (data.content || []).map(i => i.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  try { return JSON.parse(clean); }
  catch { return { insight: text, suggestion: '', nextQuestion: '' }; }
}

// ── PHASE RENDER ──
function setPhase(p) {
  state.phase = p;
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.dataset.phase === p));
  renderContent();
}

function renderContent() {
  const el = document.getElementById('phase-content');
  const ph = PHASES.find(p => p.id === state.phase);

  if (state.phase === 'problem') {
    el.innerHTML = `
      <div class="phase-header">
        <div class="phase-icon-large">${ph.glyph}</div>
        <div><div class="phase-title">${ph.title}</div><div class="phase-subtitle">${ph.subtitle}</div></div>
      </div>
      <div class="mb-20">
        <div class="field-label">MISSION BRIEF — PROBLEM STATEMENT</div>
        <textarea rows="4" id="problem-input" placeholder="Describe the core problem, tension, or decision that must be resolved. Be specific. What is at stake? Who is affected?">${escHtml(state.problemStatement)}</textarea>
        <div style="font-size:10px;color:var(--text-dim);margin-top:6px;font-family:var(--font-mono);">// Specificity is your beskar. Vague problems yield vague outcomes.</div>
      </div>
      <button class="ai-btn" id="opener-btn" onclick="generateOpener()" ${!state.problemStatement.trim() ? 'disabled' : ''}>GENERATE OPENING STRIKE</button>
      ${state.openingQuestion ? `
        <div class="intel-panel" style="margin-top:14px;">
          <div class="intel-header">OPENING GAMBIT — CALIBRATED QUESTION</div>
          <div class="intel-body">
            <div class="question-highlight">"${escHtml(state.openingQuestion)}"</div>
            <div style="font-size:10px;color:var(--text-dim);margin-top:10px;font-family:var(--font-display);letter-spacing:0.1em;">// ASK THIS. THEN WAIT. LET SILENCE DO THE WORK.</div>
          </div>
        </div>` : ''}
      <div class="session-flow">
        <div class="session-flow-header">◈ MISSION PROTOCOL — 30 MINUTE WINDOW</div>
        ${[['ALIGN','Establish shared understanding of the problem and its stakes'],['EXPLORE','Surface possibilities, perspectives, and underlying interests'],['CHALLENGE','Test assumptions and stress-test options with tactical empathy'],['COMMIT','Synthesise to a clear decision, commitment statement, and next actions']].map(([k,v]) => `
          <div class="flow-row"><div class="flow-phase">${k}</div><div class="flow-desc">${v}</div></div>`).join('')}
      </div>`;
    document.getElementById('problem-input').addEventListener('input', e => {
      state.problemStatement = e.target.value;
      document.getElementById('opener-btn').disabled = !e.target.value.trim();
    });
    return;
  }

  if (state.phase === 'commit') {
    const ai = state.aiResponses.commit;
    el.innerHTML = `
      <div class="phase-header">
        <div class="phase-icon-large">${ph.glyph}</div>
        <div><div class="phase-title">${ph.title}</div><div class="phase-subtitle">${ph.subtitle}</div></div>
      </div>
      <div class="mb-20">
        <div class="field-label">MISSION DEBRIEF NOTES</div>
        <textarea rows="3" id="commit-notes" placeholder="What is being agreed? What has shifted? What does everyone now understand?">${escHtml(state.notes.commit)}</textarea>
      </div>
      <div class="flex-gap mb-14">
        <button class="ai-btn" id="commit-ai-btn" onclick="getAI('commit')" ${state.loading.commit ? 'disabled' : ''}>${state.loading.commit ? '<span class="loading-pulse">SCANNING...</span>' : 'INTEL INSIGHT'}</button>
        <button class="ai-btn" id="commit-stmt-btn" onclick="generateCommitment()" ${state.loading.commit2 ? 'disabled' : ''}>${state.loading.commit2 ? '<span class="loading-pulse">DRAFTING...</span>' : 'DRAFT COMMITMENT'}</button>
      </div>
      ${ai ? renderIntelPanel(ai, 'TACTICAL ANALYSIS') : ''}
      ${state.commitmentStatement ? `
        <div class="intel-panel" style="border-left-color:var(--mandalore-gold);">
          <div class="intel-header">◉ COMMITMENT STATEMENT — LOCKED</div>
          <div class="intel-body"><div class="commit-box">"${escHtml(state.commitmentStatement)}"</div></div>
        </div>` : ''}
      <div class="mt-16">
        <div class="field-label">ACTION ORDERS</div>
        <div id="actions-list"></div>
        <button class="add-action-btn" onclick="addAction()">+ ASSIGN ORDER</button>
      </div>`;
    document.getElementById('commit-notes').addEventListener('input', e => { state.notes.commit = e.target.value; });
    renderActions();
    return;
  }

  const cues = CUES[state.phase] || [];
  const ai = state.aiResponses[state.phase];
  const loading = state.loading[state.phase];
  el.innerHTML = `
    <div class="phase-header">
      <div class="phase-icon-large">${ph.glyph}</div>
      <div><div class="phase-title">${ph.title}</div><div class="phase-subtitle">${ph.subtitle}</div></div>
    </div>
    ${cues.length ? `
      <div class="mb-14">
        <div class="field-label">TACTICAL CUES</div>
        <div class="cue-grid">${cues.map(c => `<div class="cue-chip">${c}</div>`).join('')}</div>
      </div>` : ''}
    <div class="mb-20">
      <div class="field-label">FIELD NOTES</div>
      <textarea rows="4" id="phase-notes" placeholder="Capture what's said, what's felt, what matters most...">${escHtml(state.notes[state.phase])}</textarea>
    </div>
    <button class="ai-btn" id="ai-btn" onclick="getAI('${state.phase}')" ${loading || !state.notes[state.phase]?.trim() ? 'disabled' : ''}>${loading ? '<span class="loading-pulse">SCANNING INTEL...</span>' : 'GET INTEL ANALYSIS'}</button>
    ${ai ? renderIntelPanel(ai, 'TACTICAL ANALYSIS — ' + state.phase.toUpperCase()) : ''}`;

  document.getElementById('phase-notes').addEventListener('input', e => {
    state.notes[state.phase] = e.target.value;
    const btn = document.getElementById('ai-btn');
    if (btn) btn.disabled = !e.target.value.trim();
  });
}

function renderIntelPanel(ai, label) {
  return `
    <div class="intel-panel">
      <div class="intel-header">${label}</div>
      <div class="intel-body">
        ${ai.insight ? `<div class="intel-row"><div class="intel-row-label">SIGNAL DETECTED</div><div>${escHtml(ai.insight)}</div></div>` : ''}
        ${ai.suggestion ? `<div class="intel-row"><div class="intel-row-label">RECOMMENDED MOVE</div><div>${escHtml(ai.suggestion)}</div></div>` : ''}
        ${ai.nextQuestion ? `<div class="intel-row"><div class="intel-row-label">NEXT STRIKE</div><div class="question-highlight">"${escHtml(ai.nextQuestion)}"</div></div>` : ''}
      </div>
    </div>`;
}

function renderActions() {
  const el = document.getElementById('actions-list');
  if (!el) return;
  el.innerHTML = state.actions.map((a, i) => `
    <div class="action-row">
      <input type="text" placeholder="Order..." value="${escHtml(a.what)}" oninput="state.actions[${i}].what=this.value" />
      <input type="text" placeholder="Assigned to" value="${escHtml(a.who)}" oninput="state.actions[${i}].who=this.value" />
      <input type="text" placeholder="By when" value="${escHtml(a.by)}" oninput="state.actions[${i}].by=this.value" />
      <button class="del-btn" onclick="removeAction(${i})">×</button>
    </div>`).join('');
}

function addAction() { state.actions.push({ what: '', who: '', by: '' }); renderActions(); }
function removeAction(i) { state.actions.splice(i, 1); renderContent(); }

// ── AI CALLS ──
const PROMPTS = {
  align:     () => `Problem: "${state.problemStatement}"\nALIGN notes: "${state.notes.align}"\n\nGenerate: insight about alignment, facilitation suggestion, best next open question. JSON: {insight, suggestion, nextQuestion}`,
  explore:   () => `Problem: "${state.problemStatement}"\nALIGN: "${state.notes.align}"\nEXPLORE: "${state.notes.explore}"\n\nGenerate: insight about what's emerging, suggestion to broaden thinking, best exploratory question. JSON: {insight, suggestion, nextQuestion}`,
  challenge: () => `Problem: "${state.problemStatement}"\nAll notes — ALIGN: "${state.notes.align}" EXPLORE: "${state.notes.explore}" CHALLENGE: "${state.notes.challenge}"\n\nGenerate: insight about assumptions, suggestion to test thinking, best challenging question. JSON: {insight, suggestion, nextQuestion}`,
  commit:    () => `Problem: "${state.problemStatement}"\nAll notes — ALIGN: "${state.notes.align}" EXPLORE: "${state.notes.explore}" CHALLENGE: "${state.notes.challenge}" COMMIT: "${state.notes.commit}"\n\nSynthesize insights, generate commitment insight, momentum suggestion, best closing accountability question. JSON: {insight, suggestion, nextQuestion}`,
};

async function getAI(phase) {
  state.loading[phase] = true;
  renderContent();
  const result = await callAI(PROMPTS[phase]());
  if (result) state.aiResponses[phase] = result;
  state.loading[phase] = false;
  renderContent();
}

async function generateOpener() {
  const btn = document.getElementById('opener-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="loading-pulse">CALCULATING TRAJECTORY...</span>'; }
  const result = await callAI(`Problem statement: "${state.problemStatement}"\n\nGenerate a single powerful open calibrated question to open the executive conversation. It must create space, surface stakes, and invite honest reflection. Return JSON: { "insight": "context framing", "suggestion": "facilitation tip", "nextQuestion": "the opening question" }`);
  if (result) state.openingQuestion = result.nextQuestion || result.insight;
  renderContent();
}

async function generateCommitment() {
  state.loading.commit2 = true;
  renderContent();
  const result = await callAI(`Problem: "${state.problemStatement}"\nAll session notes:\nALIGN: "${state.notes.align}"\nEXPLORE: "${state.notes.explore}"\nCHALLENGE: "${state.notes.challenge}"\nCOMMIT: "${state.notes.commit}"\n\nWrite a clear specific commitment statement (2-3 sentences) capturing what was agreed, why it matters, and what success looks like. Return JSON: { "insight": "the commitment statement", "suggestion": "key risk to watch", "nextQuestion": "accountability question" }`);
  if (result) state.commitmentStatement = result.insight;
  state.loading.commit2 = false;
  renderContent();
}

// ── TIMER ──
function toggleTimer() {
  if (state.timerRunning) {
    clearInterval(state.timerInterval);
    state.timerRunning = false;
    document.getElementById('timer-start-btn').textContent = '▶ START';
    document.getElementById('timer-start-btn').classList.remove('active');
  } else {
    state.timerInterval = setInterval(() => { state.elapsed++; updateTimerDisplay(); }, 1000);
    state.timerRunning = true;
    document.getElementById('timer-start-btn').textContent = '⏸ PAUSE';
    document.getElementById('timer-start-btn').classList.add('active');
  }
}

function resetTimer() {
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.elapsed = 0;
  document.getElementById('timer-start-btn').textContent = '▶ START';
  document.getElementById('timer-start-btn').classList.remove('active');
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (!el) return;
  const m = String(Math.floor(state.elapsed / 60)).padStart(2, '0');
  const s = String(state.elapsed % 60).padStart(2, '0');
  el.textContent = `${m}:${s}`;
  el.style.color = state.elapsed > 1500 ? '#D4887A' : state.elapsed > 1200 ? '#C8941A' : '#9BC99B';
}

// ── EXPORT ──
function exportSession() {
  const m = String(Math.floor(state.elapsed / 60)).padStart(2, '0');
  const s = String(state.elapsed % 60).padStart(2, '0');
  const ai = state.aiResponses;
  const L = '═'.repeat(52);
  const D = '─'.repeat(40);
  const lines = [
    L,
    '  MANDALORIAN EXECUTIVE ALIGNMENT — MISSION DEBRIEF',
    L,
    `DATE    : ${new Date().toLocaleDateString('en-AU', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}`,
    `DURATION: ${m}:${s}`,
    '',
    '[ MISSION BRIEF ]', D,
    state.problemStatement || '—',
    '',
    '[ OPENING GAMBIT ]', D,
    state.openingQuestion || '—',
    '',
    '[ ALIGN ]', D,
    'Notes: ' + (state.notes.align || '—'),
    ...(ai.align ? [`Intel: ${ai.align.insight}`, `Move: ${ai.align.suggestion}`, `Next Strike: ${ai.align.nextQuestion}`] : []),
    '',
    '[ EXPLORE ]', D,
    'Notes: ' + (state.notes.explore || '—'),
    ...(ai.explore ? [`Intel: ${ai.explore.insight}`, `Move: ${ai.explore.suggestion}`, `Next Strike: ${ai.explore.nextQuestion}`] : []),
    '',
    '[ CHALLENGE ]', D,
    'Notes: ' + (state.notes.challenge || '—'),
    ...(ai.challenge ? [`Intel: ${ai.challenge.insight}`, `Move: ${ai.challenge.suggestion}`, `Next Strike: ${ai.challenge.nextQuestion}`] : []),
    '',
    '[ COMMIT ]', D,
    'Notes: ' + (state.notes.commit || '—'),
    ...(ai.commit ? [`Intel: ${ai.commit.insight}`, `Move: ${ai.commit.suggestion}`, `Next Strike: ${ai.commit.nextQuestion}`] : []),
    '',
    L,
    '  COMMITMENT STATEMENT',
    L,
    state.commitmentStatement || '— Not yet generated —',
    '',
    L,
    '  ACTION ORDERS',
    L,
    ...state.actions.filter(a => a.what).map((a, i) => `${i+1}. ${a.what}\n   ASSIGNED: ${a.who||'TBD'}  |  BY: ${a.by||'TBD'}`),
    '',
    L,
    '  THIS IS THE WAY.',
    L,
  ];
  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `mission-debrief-${new Date().toISOString().split('T')[0]}.txt`;
  a.click(); URL.revokeObjectURL(url);
}

// ── UTILS ──
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
renderContent();
</script>
</body>
</html>
